<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Retro Shooter</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Menu principal -->
  <div id="menu">
    <h1>🚀 Retro Shooter</h1>
    <label for="playerName">Nome:</label>
    <input type="text" id="playerName" placeholder="Digite seu nome">
    <button id="startBtn">START</button>
    <button id="optionsBtn">OPÇÕES</button>
    <button id="aboutBtn">SOBRE</button>

    <!-- Controle de volume -->
    <label for="volumeSlider">Volume:</label>
    <input type="range" id="volumeSlider" min="0" max="100" value="50">

    <!-- Ranking visível no menu -->
    <div id="rankingMenu" style="margin-top:20px; color:white; font-family:'Press Start 2P';">
      <h2>🏆 Ranking</h2>
      <pre id="rankingList"></pre>
    </div>
  </div>

  <!-- Canvas do jogo -->
  <canvas id="gameCanvas" width="800" height="600" style="display:none;" tabindex="0"></canvas>

  <!-- Tela de Game Over -->
  <div id="gameOver" style="display:none; text-align:center; color:white; font-family:'Press Start 2P';">
    <h1>GAME OVER!</h1>
    <p id="finalScore"></p>
    <pre id="ranking"></pre>
    <button onclick="restartGame()">Reiniciar</button>
  </div>

  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
